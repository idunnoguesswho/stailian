<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>
<div id="page-header"></div>
<div id="flash-zone"></div>

<h1 class="page-title">Walk</h1>
<p class="page-sub">Roll from the Google Sheet map and track your current position locally.</p>

<div class="grid-2">
  <section>
    <div class="card" style="text-align:center;">
      <div id="dice-display" style="font-size:2.5rem;margin-bottom:.5rem;min-height:3rem;letter-spacing:.3em;">-- --</div>
      <div id="tile-result" style="margin-bottom:1rem;min-height:2rem;color:var(--muted);"></div>
      <button class="btn btn-primary" onclick="doRoll()" id="rollBtn" style="font-size:.9rem;padding:.65rem 2rem;">
        Roll the Dice
      </button>
    </div>

    <div class="card" id="tile-info-card">
      <div class="card-title">Current Tile</div>
      <div id="tile-info">Loading...</div>
    </div>

    <div class="card" id="outcome-card" style="display:none;"></div>
  </section>

  <section>
    <div class="card">
      <div class="card-title">Your Status</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
        <div>
          <div class="label">HEALTH</div>
          <div id="health-display"></div>
        </div>
        <div>
          <div class="label">COINS</div>
          <div id="coins-display" style="color:var(--gold);"></div>
        </div>
        <div>
          <div class="label">POSITION</div>
          <div id="pos-display"></div>
        </div>
        <div>
          <div class="label">LAYER</div>
          <div id="layer-display"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Inventory Value</div>
      <div id="inventory-value">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Wearing</div>
      <div id="wearing-summary">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Top 5</div>
      <div id="top-summary">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Recent Rolls</div>
      <div id="move-trail">Loading...</div>
    </div>
  </section>
</div>

<div id="page-footer"></div>

<script src="js/sheet-db.js"></script>
<script src="js/layout.js"></script>
<script>
let currentUser = null;
let mapTiles = [];

requireSheetUser(user => {
  currentUser = user;
  renderPageHeader("walk.html", user);
  renderPageFooter();
  mapTiles = SheetDB.mapTilesForZ(currentUser.coordZ || 0);
  updateStatusDisplay();
  renderCurrentTile();
  renderInventoryPanels();
  renderRecentRolls();
});

function layerName(z) {
  z = toNumber(z);
  if (z === 1) return "Sky";
  if (z === -1) return "Underworld";
  return "Surface";
}

function updateStatusDisplay() {
  document.getElementById("health-display").textContent = `${currentUser.health} / ${currentUser.max_health}`;
  document.getElementById("coins-display").textContent = `${currentUser.coins} coins`;
  document.getElementById("pos-display").textContent = `(${currentUser.position_x}, ${currentUser.position_y})`;
  document.getElementById("layer-display").textContent = layerName(currentUser.coordZ);
}

function nearestTile(x, y) {
  return mapTiles
    .slice()
    .sort((a, b) => {
      const da = Math.abs(toNumber(a.coordX) - x) + Math.abs(toNumber(a.coordY) - y);
      const db = Math.abs(toNumber(b.coordX) - x) + Math.abs(toNumber(b.coordY) - y);
      return da - db;
    })[0];
}

function renderCurrentTile(tile = null) {
  tile = tile || SheetDB.currentTileFor(currentUser);
  if (!tile) {
    document.getElementById("tile-info").innerHTML = "No tile found for this position.";
    return;
  }
  const el = tile.element || {};
  const magic = toNumber(tile.coordX) === toNumber(tile.coordY) ? " - Magic Ground" : "";
  const tower = toNumber(tile.coordX) === 5 && toNumber(tile.coordY) === 5 ? " - Tower" : "";
  document.getElementById("tile-info").innerHTML = `
    <div style="font-size:1.35rem;"><strong>${escHtml(el.name || "Unknown")}</strong>${magic}${tower}</div>
    <div style="margin-top:.35rem;color:var(--muted);font-size:.9rem;">
      Position (${escHtml(tile.coordX)}, ${escHtml(tile.coordY)}, ${escHtml(tile.coordZ)}) - Resource: ${escHtml(el.resource || "none")}
    </div>
    <p style="margin-top:.65rem;color:var(--muted);font-size:.9rem;">${escHtml(el.description || "")}</p>`;
}

function money(value) {
  return `${toNumber(value)} coins`;
}

function renderInventoryPanels() {
  const value = SheetDB.inventoryValue(currentUser.id);
  const score = SheetDB.battleScores(currentUser.id);
  document.getElementById("inventory-value").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;">
      <div><div class="label">ITEMS</div><strong>${money(value.itemValue)}</strong></div>
      <div><div class="label">COINS</div><strong style="color:var(--gold);">${money(value.coins)}</strong></div>
      <div><div class="label">TOTAL</div><strong style="color:var(--gold);">${money(value.total)}</strong></div>
      <div><div class="label">BATTLE</div><strong style="color:var(--gold);">${score.total}</strong></div>
    </div>`;

  const wearing = SheetDB.inventoryFor(currentUser.id).filter(row => row.wearing);
  document.getElementById("wearing-summary").innerHTML = wearing.length ? wearing.map(row => `
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(42,45,62,.5);padding:.25rem 0;">
      <span>${escHtml(SheetDB.itemDisplayName(row))}</span>
      <span style="color:var(--muted);">${escHtml(row.item.slot || "")}</span>
    </div>`).join("") : `<span style="color:var(--muted);">Nothing equipped.</span>`;

  const top = SheetDB.topInventory(currentUser.id, 5);
  document.getElementById("top-summary").innerHTML = top.length ? top.map(row => `
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(42,45,62,.5);padding:.25rem 0;">
      <span>${escHtml(SheetDB.itemDisplayName(row))}</span>
      <span style="color:var(--gold);">${money(row.item.basePrice)}</span>
    </div>`).join("") : `<span style="color:var(--muted);">No sellable inventory.</span>`;
}

function renderRecentRolls() {
  const rows = SheetDB.recentRolls(currentUser.id, 10);
  document.getElementById("move-trail").innerHTML = rows.length ? rows.map(r => `
    <div style="border-bottom:1px solid rgba(42,45,62,.5);padding:.25rem 0;">
      (${escHtml(r.x)}, ${escHtml(r.y)}, ${escHtml(r.z)}) - ${escHtml(r.rewards || "none")}
      <span style="color:var(--muted);font-size:.8rem;">${escHtml(r.rollTimeStamp || r.createdAt || "")}</span>
    </div>`).join("") : `<span style="color:var(--muted);">No rolls yet.</span>`;
}

async function doRoll() {
  const btn = document.getElementById("rollBtn");
  btn.disabled = true;
  btn.textContent = "Rolling...";

  const x = Math.floor(Math.random() * 12) + 1;
  const y = Math.floor(Math.random() * 12) + 1;
  document.getElementById("dice-display").textContent = `${x} ${y}`;

  const tile = nearestTile(x, y);
  if (!tile) {
    document.getElementById("tile-result").textContent = "No map tiles found in the Sheet.";
    btn.disabled = false;
    btn.textContent = "Roll the Dice";
    return;
  }

  const result = await SheetDB.rollCharacter(currentUser.id, tile.coordX, tile.coordY, tile.coordZ);
  currentUser = result.user;
  const rewards = result.rewards.length ? result.rewards.join(", ") : "none";
  const writeResult = result.writeResult;

  document.getElementById("tile-result").innerHTML =
    `Rolled (${x}, ${y}) -> nearest Sheet tile (${tile.coordX}, ${tile.coordY})`;
  document.getElementById("outcome-card").style.display = "";
  document.getElementById("outcome-card").innerHTML = `
    <div class="card-title">${escHtml(tile.element?.name || "Tile Result")}</div>
    <p style="color:var(--muted);">Gathered: <strong>${escHtml(rewards)}</strong></p>
    <p style="color:var(--muted);font-size:.85rem;">
      ${writeResult.queued ? "Write queued locally. Add an Apps Script write endpoint to send rolls and inventory updates into the Sheet." : "Write sent to Google Sheets endpoint."}
    </p>`;

  updateStatusDisplay();
  renderCurrentTile(tile);
  renderInventoryPanels();
  renderRecentRolls();
  btn.disabled = false;
  btn.textContent = "Roll the Dice";
}
</script>
</body>
</html>
