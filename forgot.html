<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password · Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">⚜ STAILIAN</div>
    <div class="auth-sub">Forgot your password?</div>

    <div id="msg-box"></div>
    <div id="form-wrap">

      <p class="u-auth-copy">
        Enter the email address on your account and we'll send you a reset link.
        The link expires after <strong class="u-gold">1 hour</strong>.
      </p>

      <form id="forgotForm">
        <div class="form-group form-gap-md">
          <label>Email Address</label>
          <input type="email" id="email" required autofocus
                 placeholder="your@email.com">
        </div>
        <button class="btn btn-primary u-full" type="submit" id="submitBtn">
          Send Reset Link
        </button>
      </form>

      <div class="u-auth-return">
        <a href="login.html">
          ← Back to Login
        </a>
      </div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('submitBtn');
    const email = document.getElementById('email').value.trim();

    btn.disabled = true; btn.textContent = 'Sending…';

    try {
      await auth.sendPasswordResetEmail(email);
    } catch (_) {
      // Swallow errors — always show success to prevent email enumeration
    }

    // Always show the same message
    document.getElementById('form-wrap').innerHTML = `
      <div class="alert alert-success form-message">
        If that email is registered, a reset link has been sent. Check your inbox.
      </div>
      <div class="u-auth-return-sm">
        <a href="login.html" class="btn btn-outline">← Back to Login</a>
      </div>`;
  });
</script>
</body>
</html>
