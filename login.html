<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">STAILIAN</div>
    <div class="auth-sub">Sheet database mode</div>

    <div id="error-box"></div>

    <form id="loginForm">
      <div class="form-group form-gap-sm">
        <label>Character, Username, or Email</label>
        <input type="text" id="identity" required autofocus autocomplete="username">
        <div class="field-hint">Enter your character name or email.</div>
      </div>

      <div class="form-group form-gap-lg">
        <label>Password</label>
        <div class="password-field">
          <input type="password" id="password" required autocomplete="current-password">
          <button class="password-toggle" type="button" id="passwordToggle" aria-controls="password" aria-label="Show password">
            Show
          </button>
        </div>
        <div class="field-hint">Compared against the Sheet's password_hash field in the browser.</div>
      </div>

      <button class="btn btn-primary u-full" type="submit" id="submitBtn">
        Enter the World
      </button>
    </form>

    <hr class="u-rule">

    <div class="alert alert-success auth-note">
      Google Sheets is the database for this static build. Passwords are verified as hashes, but the Sheet data is still public to anyone with the database link.
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="js/sheet-db.js"></script>
<script>
let characters = [];

function showError(msg) {
  document.getElementById("error-box").innerHTML =
    `<div class="alert alert-error form-message">${escHtml(msg)}</div>`;
}

async function boot() {
  try {
    await SheetDB.load();
    characters = SheetDB.table("characters");
  } catch (err) {
    showError(`Could not read the Google Sheet database. ${err.message}`);
  }
}

document.getElementById("passwordToggle").addEventListener("click", () => {
  const input = document.getElementById("password");
  const toggle = document.getElementById("passwordToggle");
  const showing = input.type === "text";
  input.type = showing ? "password" : "text";
  toggle.textContent = showing ? "Show" : "Hide";
  toggle.setAttribute("aria-label", showing ? "Show password" : "Hide password");
});

document.getElementById("loginForm").addEventListener("submit", async event => {
  event.preventDefault();
  const btn = document.getElementById("submitBtn");
  const identity = document.getElementById("identity").value.trim().toLowerCase();
  const password = document.getElementById("password").value;
  const match = SheetDB.findCharacterByIdentity(identity);

  if (!match) {
    showError("No matching character found in the Google Sheet.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Checking...";
  try {
    const result = await SheetDB.verifyPassword(password, match.password_hash);
    if (!result.ok) {
      if (result.reason === "missing" && password === "password") {
        await SheetDB.setCharacterPassword(match.id, password);
      } else {
        showError(result.reason === "missing"
          ? "This character does not have a password hash yet. Use the default password once to initialize it."
          : "Invalid username or password.");
        return;
      }
    }
    SheetDB.setActiveCharacterId(match.id);
    window.location.href = "walk.html";
  } catch (err) {
    showError(`Could not verify password. ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = "Enter the World";
  }
});

boot();
</script>
</body>
</html>
