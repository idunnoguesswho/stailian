<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">STAILIAN</div>
    <div class="auth-sub">Sheet database mode</div>

    <div id="error-box"></div>

    <form id="loginForm">
      <div class="form-group" style="margin-bottom:1rem;">
        <label>Character, Username, or Email</label>
        <input type="text" id="identity" required autofocus list="character-options" autocomplete="username">
        <datalist id="character-options"></datalist>
        <div class="field-hint">This static version reads characters from the Google Sheet.</div>
      </div>

      <button class="btn btn-primary" type="submit" id="submitBtn" style="width:100%;">
        Enter the World
      </button>
    </form>

    <hr style="border-color:var(--border);margin:1.5rem 0;">

    <div class="alert alert-success" style="font-size:.85rem;">
      Google Sheets is the database for this static build. Password validation needs an Apps Script or server endpoint, so this page selects a character locally.
    </div>
  </div>
</div>

<script src="js/sheet-db.js"></script>
<script>
let characters = [];

function showError(msg) {
  document.getElementById("error-box").innerHTML =
    `<div class="alert alert-error" style="margin-bottom:1.25rem;">${escHtml(msg)}</div>`;
}

function labelFor(c) {
  return `${c.charName}${c.email ? " - " + c.email : ""}${c.role ? " (" + c.role + ")" : ""}`;
}

async function boot() {
  try {
    await SheetDB.load();
    characters = SheetDB.table("characters");
    document.getElementById("character-options").innerHTML = characters
      .map(c => `<option value="${escHtml(labelFor(c))}"></option>`)
      .join("");
  } catch (err) {
    showError(`Could not read the Google Sheet database. ${err.message}`);
  }
}

document.getElementById("loginForm").addEventListener("submit", event => {
  event.preventDefault();
  const identity = document.getElementById("identity").value.trim().toLowerCase();
  const match = characters.find(c =>
    String(c.id).toLowerCase() === identity ||
    String(c.charName || "").toLowerCase() === identity ||
    String(c.email || "").toLowerCase() === identity ||
    labelFor(c).toLowerCase() === identity
  );

  if (!match) {
    showError("No matching character found in the Google Sheet.");
    return;
  }

  SheetDB.setActiveCharacterId(match.id);
  window.location.href = "walk.html";
});

boot();
</script>
</body>
</html>
