<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wardrobe - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
<style>
  .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:1.5rem; flex-wrap:wrap; }
  .tab-btn {
    font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.08em;
    padding:.65rem 1.1rem; color:var(--muted); background:none; border:none;
    border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap;
  }
  .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }
  .tab-pane { display:none; }
  .tab-pane.active { display:block; }
</style>
</head>
<body>
<div id="page-header"></div>

<h1 class="page-title">Wardrobe</h1>
<p class="page-sub">Inventory and shop data from Google Sheets.</p>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('owned',this)">Owned Items</button>
  <button class="tab-btn" onclick="switchTab('clothing',this)">Clothing</button>
  <button class="tab-btn" onclick="switchTab('scrolls',this)">Scrolls</button>
  <button class="tab-btn" onclick="switchTab('shop',this)">Shop Data</button>
</div>

<div class="tab-pane active" id="tab-owned">
  <div class="card">
    <div class="card-title">Owned Inventory</div>
    <div id="owned-list">Loading...</div>
  </div>
</div>

<div class="tab-pane" id="tab-clothing">
  <div class="card">
    <div class="card-title">Clothing</div>
    <div id="clothing-list">Loading...</div>
  </div>
</div>

<div class="tab-pane" id="tab-scrolls">
  <div class="card">
    <div class="card-title">Scrolls and Resources</div>
    <div id="scrolls-list">Loading...</div>
  </div>
</div>

<div class="tab-pane" id="tab-shop">
  <div class="card">
    <div class="card-title">Available Items</div>
    <div id="shop-list">Loading...</div>
  </div>
</div>

<div id="page-footer"></div>

<script src="js/sheet-db.js"></script>
<script src="js/layout.js"></script>
<script>
requireSheetUser(user => {
  renderPageHeader("wardrobe.html", user);
  renderPageFooter();
  renderOwned(user);
  renderShop();
});

function switchTab(name, btn) {
  document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}

function itemElement(item) {
  const element = SheetDB.byId("element")[String(item.elementId)] || {};
  return element.name || "";
}

function rowHtml(row) {
  const item = row.item || row;
  const element = itemElement(item);
  return `
    <div style="display:grid;grid-template-columns:1.5fr .7fr .6fr .6fr;gap:.75rem;border-bottom:1px solid rgba(42,45,62,.5);padding:.35rem 0;align-items:center;">
      <span>${escHtml(item.itemName || "Item " + (row.itemId || item.id))}</span>
      <span style="color:var(--muted);">${escHtml(item.slot || "")}</span>
      <span style="color:var(--gold);">${escHtml(row.quantityOnHand ?? item.basePrice ?? "")}</span>
      <span style="color:var(--muted);">${escHtml(element)}</span>
    </div>`;
}

function renderOwned(user) {
  const rows = SheetDB.inventoryFor(user.id);
  const clothing = rows.filter(r => /shirt|pants|socks|clothing/i.test(r.item.slot || r.item.itemName || ""));
  const scrolls = rows.filter(r => /scroll|coin|flower|dye|resource/i.test(r.item.slot || r.item.itemName || ""));

  document.getElementById("owned-list").innerHTML = rows.length
    ? `<div style="display:grid;grid-template-columns:1.5fr .7fr .6fr .6fr;gap:.75rem;color:var(--gold);font-family:'Cinzel',serif;font-size:.72rem;">
         <span>Item</span><span>Slot</span><span>Qty</span><span>Element</span>
       </div>${rows.map(rowHtml).join("")}`
    : `<span style="color:var(--muted);">No inventory rows found for this character.</span>`;

  document.getElementById("clothing-list").innerHTML = clothing.length
    ? clothing.map(rowHtml).join("")
    : `<span style="color:var(--muted);">No clothing rows found.</span>`;

  document.getElementById("scrolls-list").innerHTML = scrolls.length
    ? scrolls.map(rowHtml).join("")
    : `<span style="color:var(--muted);">No scroll/resource rows found.</span>`;
}

function renderShop() {
  const items = SheetDB.table("items")
    .filter(item => toNumber(item.isActive, 1) === 1)
    .sort((a, b) => String(a.slot).localeCompare(String(b.slot)) || toNumber(a.basePrice) - toNumber(b.basePrice));

  document.getElementById("shop-list").innerHTML = `
    <div style="display:grid;grid-template-columns:1.5fr .7fr .6fr .6fr;gap:.75rem;color:var(--gold);font-family:'Cinzel',serif;font-size:.72rem;">
      <span>Item</span><span>Slot</span><span>Price</span><span>Element</span>
    </div>${items.map(item => rowHtml(item)).join("")}`;
}
</script>
</body>
</html>
