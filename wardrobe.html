<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wardrobe - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>
<div id="page-header"></div>

<h1 class="page-title">Wardrobe</h1>
<p class="page-sub">Inventory, wearing, selling, and shop data from Google Sheets.</p>

<div id="flash-zone"></div>

<div class="grid-2">
  <section>
    <div class="card">
      <div class="card-title">Inventory Value</div>
      <div id="inventory-value">Loading...</div>
    </div>
  </section>
  <section>
    <div class="card">
      <div class="card-title">Battle Score</div>
      <div id="battle-score">Loading...</div>
    </div>
  </section>
</div>

<div class="card">
  <div class="card-title">Owned Inventory</div>
  <div class="filter-row" id="slot-filters"></div>
  <div class="filter-row" id="element-filters"></div>
  <div class="btn-row inventory-sell-row">
    <button class="btn btn-danger btn-sm" onclick="sellAllFiltered()">Sell All (Not Wearing)</button>
  </div>
  <div class="tbl-wrap" id="owned-list">Loading...</div>
</div>

<div class="card">
  <div class="card-title">Available Items</div>
  <div class="tbl-wrap" id="shop-list">Loading...</div>
</div>

<div id="page-footer"></div>

<script src="js/sheet-db.js"></script>
<script src="js/layout.js"></script>
<script>
let currentUser = null;
let activeSlot = "All";
let activeElement = "All";

requireSheetUser(user => {
  currentUser = user;
  renderPageHeader("wardrobe.html", user);
  renderPageFooter();
  renderAll();
  renderShop();
});

function money(value) {
  return `${toNumber(value)} coins`;
}

function jsArg(value) {
  return escHtml(JSON.stringify(String(value)));
}

function flash(message) {
  document.getElementById("flash-zone").innerHTML = `<div class="alert alert-success">${escHtml(message)}</div>`;
}

function renderAll() {
  renderSummary();
  renderFilters();
  renderOwned();
}

function renderSummary() {
  const value = SheetDB.inventoryValue(currentUser.id);
  document.getElementById("inventory-value").innerHTML = `
    <div class="summary-grid-3">
      <div><div class="label">ITEMS</div><strong>${money(value.itemValue)}</strong></div>
      <div><div class="label">COINS</div><strong class="num">${money(value.coins)}</strong></div>
      <div><div class="label">TOTAL</div><strong class="num">${money(value.total)}</strong></div>
    </div>`;

  const score = SheetDB.battleScores(currentUser.id);
  document.getElementById("battle-score").innerHTML = `
    <div class="score-total">${score.total}</div>
    <div class="muted">${score.byElement.slice(0, 5).map(row => `${escHtml(row.icon)} ${escHtml(row.element)} ${escHtml(row.score)}`).join(" | ") || "No battle items"}</div>`;
}

function renderFilters() {
  const rows = SheetDB.inventoryFor(currentUser.id).filter(row => !/coin/i.test(row.item.itemName || ""));
  const slots = ["All", ...Array.from(new Set(rows.map(row => row.item.slot).filter(Boolean))).sort()];
  const elements = ["All", ...Array.from(new Set(rows.map(row => row.element.name).filter(Boolean))).sort()];
  document.getElementById("slot-filters").innerHTML = slots.map(slot => `
    <button class="tab-btn ${slot === activeSlot ? "active" : ""}" onclick="setSlotFilter(${jsArg(slot)})">
      ${escHtml(slot)} (${slot === "All" ? rows.length : rows.filter(row => row.item.slot === slot).reduce((sum, row) => sum + row.qoh, 0)})
    </button>`).join("");
  document.getElementById("element-filters").innerHTML = elements.map(element => `
    <button class="tab-btn ${element === activeElement ? "active" : ""}" onclick="setElementFilter(${jsArg(element)})">
      ${escHtml(element)} (${element === "All" ? rows.length : rows.filter(row => row.element.name === element).reduce((sum, row) => sum + row.qoh, 0)})
    </button>`).join("");
}

function setSlotFilter(slot) {
  activeSlot = slot;
  renderAll();
}

function setElementFilter(element) {
  activeElement = element;
  renderAll();
}

function rowHtml(row) {
  const item = row.item || {};
  return `
    <tr>
      <td>${escHtml(SheetDB.itemDisplayName(row))}</td>
      <td class="muted">${escHtml(row.slotInfo.icon_emoji || "")} ${escHtml(item.slot || "")}</td>
      <td>${escHtml(row.element.icon || "")} ${escHtml(row.element.name || "")}</td>
      <td class="num">${escHtml(row.qoh)}</td>
      <td class="num">${money(row.baseValue)}</td>
      <td class="num">${escHtml(row.battleScore)}</td>
      <td>${row.wearing ? "Yes" : "No"}</td>
      <td>
        <div class="inventory-actions">
          ${item.slot && !/coin/i.test(item.itemName || "") ? `<button class="btn btn-outline btn-sm" onclick="toggleWear(${jsArg(row.itemId)}, ${row.wearing ? "false" : "true"})">${row.wearing ? "Remove" : "Wear"}</button>` : ""}
          ${!/coin/i.test(item.itemName || "") ? `<button class="btn btn-danger btn-sm" onclick="sellOne(${jsArg(row.itemId)})">Sell</button>` : ""}
        </div>
      </td>
    </tr>`;
}

function renderOwned() {
  const rows = SheetDB.inventoryFor(currentUser.id)
    .filter(row => activeSlot === "All" || row.item.slot === activeSlot)
    .filter(row => activeElement === "All" || row.element.name === activeElement);

  document.getElementById("owned-list").innerHTML = rows.length ? `
    <table>
      <thead><tr><th>Item</th><th>Slot</th><th>Element</th><th>Qty</th><th>Value</th><th>Battle Score</th><th>Wearing</th><th>Sell</th></tr></thead>
      <tbody>${rows.map(rowHtml).join("")}</tbody>
    </table>` : `<span class="muted">No inventory rows found for this filter.</span>`;
}

async function toggleWear(itemId, shouldWear) {
  await SheetDB.setWearing(currentUser.id, itemId, shouldWear);
  flash(shouldWear ? "Item equipped." : "Item removed.");
  renderAll();
}

async function sellOne(itemId) {
  const result = await SheetDB.sellItem(currentUser.id, itemId, 1);
  flash(`Sold for ${result.totalGold || 0} coins.`);
  renderAll();
}

async function sellAllFiltered() {
  const result = await SheetDB.sellAll(currentUser.id, activeSlot);
  flash(`Sold not-wearing ${activeSlot === "All" ? "items" : activeSlot + " items"} for ${result.totalGold || 0} coins.`);
  renderAll();
}

function renderShop() {
  const items = SheetDB.table("items")
    .filter(item => toNumber(item.isActive, 1) === 1)
    .sort((a, b) => String(a.slot).localeCompare(String(b.slot)) || toNumber(a.basePrice) - toNumber(b.basePrice));

  document.getElementById("shop-list").innerHTML = `
    <table>
      <thead><tr><th>Item</th><th>Slot</th><th>Element</th><th>Price</th><th>Battle Score</th></tr></thead>
      <tbody>${items.map(item => {
        const element = SheetDB.elementsById()[String(item.elementId)] || {};
        return `<tr>
          <td>${escHtml(item.itemName)}</td>
          <td class="muted">${escHtml(item.slot || "")}</td>
          <td>${escHtml(element.icon || "")} ${escHtml(element.name || "")}</td>
          <td class="num">${money(item.basePrice)}</td>
          <td class="num">${escHtml(item.elementMultiplier || 0)}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
}
</script>
</body>
</html>
