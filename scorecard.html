<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorecard - Stailian</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stailian.css">
</head>
<body>
<div id="page-header"></div>

<h1 class="page-title">Scorecard</h1>
<p class="page-sub">Live character profile from the Google Sheet database.</p>

<div class="grid-2">
  <section>
    <div class="card">
      <div class="card-title">Character</div>
      <div id="character-card">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Traits</div>
      <div id="traits-list">Loading...</div>
    </div>
  </section>

  <section>
    <div class="card">
      <div class="card-title">Inventory Value</div>
      <div id="inventory-value">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Battle Score</div>
      <div id="battle-score">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Wearing</div>
      <div id="wearing-list">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Recent Rolls</div>
      <div id="rolls-list">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Battles</div>
      <div id="battles-list">Loading...</div>
    </div>
  </section>
</div>

<div id="page-footer"></div>

<script src="js/sheet-db.js"></script>
<script src="js/layout.js"></script>
<script>
requireSheetUser(user => {
  renderPageHeader("scorecard.html", user);
  renderPageFooter();
  renderCharacter(user);
  renderTraits(user);
  renderInventorySummary(user);
  renderWearing(user);
  renderRolls(user);
  renderBattles(user);
});

function renderCharacter(user) {
  document.getElementById("character-card").innerHTML = `
    <div style="display:flex;gap:1rem;align-items:flex-start;">
      ${user.imagePath ? `<img src="${escHtml(user.imagePath)}" alt="" style="width:82px;height:82px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);">` : ""}
      <div>
        <div style="font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold);">${escHtml(user.charName)}</div>
        <div style="color:var(--muted);">${escHtml(user.role || "")}</div>
        <div style="margin-top:.5rem;">HP: <strong>${escHtml(user.health)}</strong> / ${escHtml(user.max_health)}</div>
        <div>Position: (${escHtml(user.position_x)}, ${escHtml(user.position_y)}, ${escHtml(user.coordZ)})</div>
        ${user.charDescription ? `<p style="margin-top:.75rem;color:var(--muted);">${escHtml(user.charDescription)}</p>` : ""}
      </div>
    </div>`;
}

function renderTraits(user) {
  const traits = SheetDB.characterTraits(user.id);
  document.getElementById("traits-list").innerHTML = traits.length ? traits.map(t => `
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(42,45,62,.5);padding:.3rem 0;">
      <span>${escHtml(t.definition.label || "Trait " + t.traitid)}</span>
      <strong style="color:var(--gold);">${escHtml(t.traitValue)}</strong>
    </div>`).join("") : `<span style="color:var(--muted);">No traits found.</span>`;
}

function money(value) {
  return `${toNumber(value)} coins`;
}

function renderInventorySummary(user) {
  const value = SheetDB.inventoryValue(user.id);
  const score = SheetDB.battleScores(user.id);
  document.getElementById("inventory-value").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;">
      <div><div class="label">ITEMS</div><strong>${money(value.itemValue)}</strong></div>
      <div><div class="label">COINS</div><strong style="color:var(--gold);">${money(value.coins)}</strong></div>
      <div><div class="label">TOTAL</div><strong style="color:var(--gold);">${money(value.total)}</strong></div>
    </div>`;
  document.getElementById("battle-score").innerHTML = `
    <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);">${score.total}</div>
    ${score.byElement.length ? score.byElement.map(row => `
      <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(42,45,62,.5);padding:.25rem 0;">
        <span>${escHtml(row.icon || "")} ${escHtml(row.element)}</span>
        <strong style="color:var(--gold);">${escHtml(row.score)}</strong>
      </div>`).join("") : `<span style="color:var(--muted);">No battle items found.</span>`}`;
}

function renderWearing(user) {
  const rows = SheetDB.inventoryFor(user.id).filter(row => row.wearing);
  document.getElementById("wearing-list").innerHTML = rows.length ? rows.map(row => `
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(42,45,62,.5);padding:.3rem 0;">
      <span>${escHtml(SheetDB.itemDisplayName(row))}</span>
      <span style="color:var(--muted);">${escHtml(row.item.slot || "")}</span>
    </div>`).join("") : `<span style="color:var(--muted);">No inventory rows found.</span>`;
}

function renderRolls(user) {
  const rows = SheetDB.recentRolls(user.id, 12);
  document.getElementById("rolls-list").innerHTML = rows.length ? rows.map(r => `
    <div style="border-bottom:1px solid rgba(42,45,62,.5);padding:.3rem 0;">
      (${escHtml(r.x)}, ${escHtml(r.y)}, ${escHtml(r.z)}) - ${escHtml(r.rewards || "none")}
      <span style="display:block;color:var(--muted);font-size:.8rem;">${escHtml(r.rollTimeStamp || r.createdAt || "")}</span>
    </div>`).join("") : `<span style="color:var(--muted);">No rolls found.</span>`;
}

function renderBattles(user) {
  const battles = SheetDB.table("battle_log")
    .filter(row => String(row.attacker_id) === String(user.id) || String(row.defender_id) === String(user.id))
    .slice()
    .reverse();
  document.getElementById("battles-list").innerHTML = battles.length ? battles.map(b => `
    <div style="border-bottom:1px solid rgba(42,45,62,.5);padding:.3rem 0;">
      Battle #${escHtml(b.id)}: ${escHtml(b.attacker_id)} vs ${escHtml(b.defender_id)}
      <span style="display:block;color:var(--muted);font-size:.8rem;">Winner: ${escHtml(b.winner_id)} - ${escHtml(b.fought_at)}</span>
    </div>`).join("") : `<span style="color:var(--muted);">No battle rows for this character.</span>`;
}
</script>
</body>
</html>
